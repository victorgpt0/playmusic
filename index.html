<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victor's Audio Player</title>
  </head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
    }
    .main {
      flex: 1;
      padding: 50px;
    }
    .audio-player {
      background: #000;
      height: 300px;
      border-radius: 20px;
      padding: 30px;
    }
    .footer {
      background-color: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }
    .volume {
      display: flex;
      align-items: center;
      margin-top: 20px;
      width: 100%;
    }
    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-top: 20px;
      margin-bottom: 20px;
      color: white;
    }
    input[type="range"] {
      flex: 1;
      cursor: pointer;
    }
    #volume-slider {
      width: 50%;
    }
    p {
      color: white;
      font-size: 18px;
      margin: 0;
      text-align: center;
      font:
        bold 24px Arial,
        sans-serif;
    }
    button:hover {
      transform: scale(1.1);
    }
    .buttons {
      display: flex;
      gap: 30px;
      justify-content: center;
    }
  </style>
  <body>
    <div class="header">
      <h1>Victor's Audio Player</h1>
    </div>
    <main>
      <div class="main">
        <div class="audio-player">
          <p id="song-title">Greatest Hits - Skepta</p>
          <audio id="audio" src="audio.mp3" type="audio/mpeg"></audio>
          <div class="progress">
            <span id="current-time"> 0:00 </span>
            <input
              type="range"
              name="progress"
              id="progress"
              value="0"
              max="100"
            />
            <span id="duration"> 0:00 </span>
          </div>

          <div class="controls">
            <div class="buttons">
            <button onclick="togglePlay()" id="playBtn">
              <svg
                id="play"
                width="50px"
                height="50px"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >

                  stroke="#1C274C"
                  stroke-width="1.5"
                />
              </svg>
              <svg
                id="pause"
                width="50px"
                height="50px"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                style="display: none"
              >

                  fill="#1C274C"
                />
              </svg>
            </button>
            <button onclick="audioStop()">
              <svg
                width="50px"
                height="50px"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"

                  fill="#1C274C"
                />
              </svg>
            </button>
            </div>

            <div class="volume">
              <svg width="24" height="24  " viewBox="0 0 24 24" fill="white">
                <path d="M11 5L6 9H2V15H6L11 19V5Z"></path>
              </svg>
              <input
                type="range"
                id="volume-slider"
                min="0"
                max="1"
                step="0.01"
                value="1"
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="footer"></div>
    <script src="audio.js"></script>
  </body>
</html>
